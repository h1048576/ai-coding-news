<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coding 每日新闻</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>
    <header>
        <div class="container">
            <h1>🤖 AI Coding 每日新闻</h1>
            <p class="subtitle">追踪 AI 编程领域的最新动态</p>
            <div class="meta">
                <span id="last-updated">最后更新：加载中...</span>
                <a href="https://github.com/h1048576/ai-coding-news" target="_blank" class="github-link">
                    <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                    GitHub
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="news-container">
            <!-- 新闻内容将通过 JS 加载 -->
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>正在加载新闻...</p>
        </div>
        
        <div id="error" class="error" style="display: none;">
            <p>⚠️ 加载失败，请稍后重试</p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>数据来源：DuckDuckGo, Brave, Yahoo 搜索 | 每日自动更新</p>
            <p>开源项目 <a href="https://github.com/h1048576/ai-coding-news" target="_blank">ai-coding-news</a></p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
