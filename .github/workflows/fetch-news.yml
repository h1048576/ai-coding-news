name: Fetch AI Coding News

on:
  schedule:
    # 每天 UTC 时间 00:00 运行 (北京时间 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv lxml

      - name: Clone union-search-skill
        run: |
          mkdir -p skills
          git clone --depth 1 https://github.com/runningZ1/union-search-skill.git skills/union-search-skill

      - name: Fetch AI Coding News
        run: |
          cd skills/union-search-skill
          
          # 创建 .env 文件
          cat > .env << 'EOF'
          # No API keys needed for DuckDuckGo, Brave, Yahoo
          EOF
          
          # 搜索 AI Coding 新闻 - 使用直接搜索而非联合搜索
          python scripts/duckduckgo/duckduckgo_search.py "AI coding news 2026" -m 15 --json > /tmp/ddg.json 2>/dev/null || echo '[]' > /tmp/ddg.json
          python scripts/brave/brave_search.py "AI coding news 2026" -m 15 --json > /tmp/brave.json 2>/dev/null || echo '[]' > /tmp/brave.json
          python scripts/yahoo/yahoo_search.py "AI coding news 2026" -m 15 --json > /tmp/yahoo.json 2>/dev/null || echo '[]' > /tmp/yahoo.json

      - name: Process News Data
        run: |
          python << 'PYTHON_SCRIPT'
          import json
          import os
          import re
          from datetime import datetime, timezone

          def is_valid_url(url):
              """检查 URL 是否有效，过滤掉重定向链接"""
              if not url or url == '#':
                  return False
              # 过滤掉搜索引擎的重定向链接
              invalid_patterns = [
                  r'duckduckgo\.com/y\.js',
                  r'duckduckgo\.com/\.js',
                  r'google\.com/url\?',
                  r'bing\.com/ck/a',
                  r'^/search',
                  r'^/\?q=',
              ]
              for pattern in invalid_patterns:
                  if re.search(pattern, url, re.IGNORECASE):
                      return False
              return True

          def clean_url(url):
              """清理 URL，提取真实链接"""
              if not url:
                  return '#'
              # 处理 DuckDuckGo 重定向
              if 'duckduckgo.com/y.js' in url:
                  # 尝试从 URL 中提取 u3 参数
                  match = re.search(r'u3=([^&]+)', url)
                  if match:
                      import urllib.parse
                      return urllib.parse.unquote(match.group(1))
              return url

          # 读取搜索结果
          def load_json_file(path):
              try:
                  with open(path, 'r', encoding='utf-8') as f:
                      data = json.load(f)
                      return data if isinstance(data, list) else []
              except:
                  return []

          ddg_results = load_json_file('/tmp/ddg.json')
          brave_results = load_json_file('/tmp/brave.json')
          yahoo_results = load_json_file('/tmp/yahoo.json')

          # 处理新闻数据
          news_items = []
          timestamp = datetime.now(timezone.utc).isoformat()

          # 处理 DuckDuckGo 结果
          for item in ddg_results[:10]:
              if isinstance(item, dict):
                  url = clean_url(item.get('url', item.get('link', '')))
                  if is_valid_url(url):
                      news_items.append({
                          'title': item.get('title', '无标题'),
                          'url': url,
                          'snippet': item.get('body', item.get('snippet', '')),
                          'platform': 'duckduckgo',
                          'timestamp': timestamp
                      })

          # 处理 Brave 结果
          for item in brave_results[:10]:
              if isinstance(item, dict):
                  url = item.get('url', item.get('link', ''))
                  if is_valid_url(url):
                      news_items.append({
                          'title': item.get('title', '无标题'),
                          'url': url,
                          'snippet': item.get('snippet', item.get('description', '')),
                          'platform': 'brave',
                          'timestamp': timestamp
                      })

          # 处理 Yahoo 结果
          for item in yahoo_results[:10]:
              if isinstance(item, dict):
                  url = item.get('url', item.get('link', ''))
                  if is_valid_url(url):
                      news_items.append({
                          'title': item.get('title', '无标题'),
                          'url': url,
                          'snippet': item.get('snippet', item.get('description', '')),
                          'platform': 'yahoo',
                          'timestamp': timestamp
                      })

          # 如果没有获取到新闻，使用备用数据
          if len(news_items) == 0:
              news_items = [{
                  'title': '暂无新闻数据，请稍后重试',
                  'url': 'https://github.com/h1048576/ai-coding-news',
                  'snippet': '新闻获取失败，请检查 GitHub Actions 日志',
                  'platform': 'system',
                  'timestamp': timestamp
              }]

          # 生成最终数据
          output_data = {
              'timestamp': timestamp,
              'generated_at': datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC'),
              'total_count': len(news_items),
              'news': news_items
          }

          # 写入 news.json
          os.makedirs('/tmp/output', exist_ok=True)
          with open('/tmp/output/news.json', 'w', encoding='utf-8') as f:
              json.dump(output_data, f, ensure_ascii=False, indent=2)

          print(f"Generated news.json with {len(news_items)} items")
          PYTHON_SCRIPT

      - name: Copy news to root
        run: |
          cp /tmp/output/news.json ./news.json

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if ! git diff --quiet news.json; then
            git add news.json
            git commit -m "📰 Update AI coding news $(date +%Y-%m-%d)"
            git push
            echo "News updated successfully"
          else
            echo "No changes to commit"
          fi
